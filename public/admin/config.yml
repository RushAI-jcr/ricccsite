backend:
  name: github
  repo: riccc-rush-lab/ricccsite
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: team
    label: Team Members
    folder: content/team
    create: true
    delete: true
    extension: mdx
    slug: "{{slug}}"
    summary: "{{name}} — {{role}} ({{tier}})"
    sortable_fields:
      fields: [name, tier]
    fields:
      - { name: name, label: Name, widget: string, hint: "Full name with degrees, e.g. 'Jane Doe, MD, PhD'" }
      - { name: role, label: Role/Title, widget: string, hint: "e.g. 'Associate Professor' or 'PhD Student, Biomedical Informatics'" }
      - { name: tier, label: Tier, widget: select, options: [pi, staff, student, alumni], default: student }
      - { name: email, label: Email, widget: string }
      - { name: photo, label: Photo, widget: image, required: false, hint: "Square headshot, at least 400x400px" }
      - { name: pubmed_name, label: PubMed Author Name, widget: string, required: false, hint: "e.g. 'Smith J' — enables auto-fetching your publications from PubMed" }
      - { name: orcid, label: ORCID, widget: string, required: false, hint: "e.g. 0000-0000-0000-0000" }
      - { name: scholar, label: Google Scholar URL, widget: string, required: false, hint: "Full profile URL, e.g. https://scholar.google.com/citations?user=..." }
      - { name: linkedin, label: LinkedIn profile URL, widget: string, required: false, hint: "Full URL, e.g. https://www.linkedin.com/in/username" }
      - { name: website, label: Personal Website, widget: string, required: false }
      - { name: github, label: GitHub Username, widget: string, required: false }
      - { name: display_order, label: Display Order, widget: number, default: 50, hint: "Lower numbers appear first within the same tier" }
      - { name: body, label: Bio, widget: markdown, hint: "2-3 sentences about your research interests and background" }

  - name: spotlights
    label: Research Spotlights
    file: content/spotlights.json
    description: "Featured publications shown on the home page (max 5)"
    fields:
      - name: spotlights
        label: Spotlights
        widget: list
        max: 5
        fields:
          - { name: title, label: Title, widget: string }
          - { name: journal, label: Journal, widget: string }
          - { name: year, label: Year, widget: string }
          - { name: authors, label: Authors, widget: string, hint: "e.g. 'Smith J, Doe J, et al.'" }
          - { name: doi, label: DOI, widget: string, required: false, hint: "e.g. 10.1001/jama.2023.12345" }
          - { name: pmid, label: PubMed ID, widget: string, required: false }
          - { name: image, label: Key Figure, widget: image, required: false }

  - name: site_config
    label: Site Settings
    file: content/site-config.json
    description: "Lab name, PI info, links, and PubMed search query"
    fields:
      - { name: lab_name, label: Lab Name, widget: string, default: "RICCC Lab" }
      - { name: full_name, label: Full Lab Name, widget: string, default: "Rush Institute for Computational and Clinical Care" }
      - { name: tagline, label: Tagline, widget: string }
      - { name: pubmed_query, label: PubMed Search Query, widget: string, hint: "e.g. 'Parker WF[Author] AND Rush University[Affiliation]'" }
      - name: pi
        label: PI Info
        widget: object
        fields:
          - { name: name, label: Name, widget: string }
          - { name: credentials, label: Credentials, widget: string, hint: "e.g. 'MD, PhD'" }
          - { name: title, label: Title, widget: string }
          - { name: email, label: Email, widget: string }
      - name: links
        label: External Links
        widget: object
        fields:
          - { name: google_scholar, label: Google Scholar URL, widget: string, required: false }
          - { name: my_ncbi, label: MyNCBI URL, widget: string, required: false }
          - { name: github, label: GitHub Org URL, widget: string, required: false }
          - { name: twitter, label: X/Twitter URL, widget: string, required: false }
          - { name: bluesky, label: Bluesky URL, widget: string, required: false }
          - { name: clif, label: CLIF Consortium URL, widget: string, required: false }
